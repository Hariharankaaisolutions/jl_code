##############################################################
#           JL-CAM MASTER CONFIGURATION
#           /opt/secure_ai/config/master.properties
#           Single source of truth for all settings
##############################################################

##############################################################
#                    SYSTEM MODE
##############################################################
DETECTION_MODE=live
SEGMENT_DURATION_SECS=600

##############################################################
#                    ACTIVE CAMERAS
##############################################################
ACTIVE_CAMS=cam1

##############################################################
#                    AUTOSTART
##############################################################
AUTOSTART_ENABLED=true
WORKING_HOURS_START=08:00
WORKING_HOURS_END=18:00
AUTO_START_DELAY_MINS=10
AUTO_START_RESTART=true
AUTO_START_RESTART_DELAY_SECS=30

##############################################################
#                    CAM1 CONFIG
##############################################################
CAM1_PORT=8000
CAM1_RTMP_INPUT=rtmp://localhost/live/cam_1
CAM1_MODEL=cam1/models/jl_yolox_cam1.pth
CAM1_EXP_FILE=cam1/YOLOX/exps/default/yolox_s.py
CAM1_NUM_CLASSES=7
CAM1_FRAME_WIDTH=640
CAM1_FRAME_HEIGHT=640
CAM1_CROSS_LINE_X=200
CAM1_CROSS_DIRECTION=left

# Inference mode: grayscale or rgb
CAM1_INFERENCE_MODE=grayscale
CAM1_CONF_THRES=0.4
CAM1_IOU_THRES=0.45
# Class index to name mapping (must match model training order)
CAM1_CLASS_NAMES=0:box-Sedr,1:bale,2:box,3:fbale,4:sbale,5:tbale_a,6:tbale_b
CAM1_BOX_CLASSES=box:1
CAM1_BALE_CLASSES=bale:1,fbale:1,sbale:2,tbale_a:2,tbale_b:2
CAM1_DEFAULT_COUNTS=box:0,bale:0,trolley:0,bag:0
CAM1_EXCLUSION_ZONES=cam1/exclusion_zones.json
CAM1_VIDEO_BASE_DIR=/opt/secure_ai/cam1/video

##############################################################
#                    CAM2 CONFIG
##############################################################
CAM2_PORT=8001
CAM2_RTMP_INPUT=rtmp://localhost/live/cam_2
CAM2_MODEL=cam2/models/jl_yolox_cam2.pth
CAM2_EXP_FILE=cam2/YOLOX/exps/default/yolox_s.py
CAM2_NUM_CLASSES=5
CAM2_FRAME_WIDTH=640
CAM2_FRAME_HEIGHT=640
CAM2_CROSS_LINE_X=200
CAM2_CROSS_DIRECTION=right
CAM2_CONF_THRES=0.4
CAM2_IOU_THRES=0.45
# Class index to name mapping
CAM2_CLASS_NAMES=0:bag,1:2bag,2:3bag,3:4bag,4:trolley
CAM2_BAG_CLASSES=bag:1,2bag:2,3bag:3,4bag:4
CAM2_INFERENCE_MODE=rgb
CAM2_DEFAULT_COUNTS=bag:0,trolley:0
CAM2_VIDEO_BASE_DIR=/opt/secure_ai/cam2/video


##############################################################
#           JL-CAM LOGGING CONFIGURATION
#           /opt/secure_ai/config/logging.properties
##############################################################

# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_LEVEL=INFO

# Log format
LOG_FORMAT=%(asctime)s | %(levelname)-8s | [%(name)-16s] | %(message)s
LOG_DATE_FORMAT=%Y-%m-%d %H:%M:%S

# Log directory
LOG_DIR=/opt/secure_ai/logs

# Log file prefix (creates jlcam_YYYY-MM-DD.log)
LOG_PREFIX=jlcam

# Rotation — max size per file
LOG_MAX_MB=50

# Number of backup files to keep
LOG_BACKUP_COUNT=10

# Zip logs older than N days
LOG_ZIP_AFTER_DAYS=2

# Delete logs older than N days
LOG_DELETE_AFTER_DAYS=45

# Console output (true/false)
LOG_CONSOLE=false

# Per-module log levels (override global)
LOG_LEVEL_CAM1=INFO
LOG_LEVEL_CAM2=INFO
LOG_LEVEL_DB=INFO
LOG_LEVEL_MQTT=WARNING
LOG_LEVEL_MOG2=INFO
LOG_LEVEL_YOLOX=INFO
LOG_LEVEL_TRACK=INFO
LOG_LEVEL_FRAME=INFO
LOG_LEVEL_API=INFO
LOG_LEVEL_AUTO=INFO
LOG_LEVEL_STOP=INFO
LOG_LEVEL_METRICS=INFO
LOG_LEVEL_HOUSE=INFO
LOG_LEVEL_CLOUD=INFO
LOG_LEVEL_MAIL=INFO

# =============================================================
# logging.properties — SmartLogger Configuration
# =============================================================
# Modes:
#   A = DEBUG  (everything — very noisy, 100MB/day)
#   B = INFO   (meaningful events only — ~1MB/day)
#   C = ERROR  (errors only — silent unless something breaks)
# =============================================================

# Global default — INFO only (was A=DEBUG, caused 100MB/day)
LOGGING.MODE=B

# --- Noisy subsystems — ERROR only ---
LOGGING.VIDEOSAVER=C
LOGGING.FRAMESAVER=C
LOGGING.TRACKER=C

# --- Meaningful subsystems — INFO ---
LOGGING.DETECTION=B
LOGGING.SESSION=B
LOGGING.MQTT=B
LOGGING.EMAIL=B
LOGGING.DATABASE=B
LOGGING.DBUPDATER=B
LOGGING.API=B
LOGGING.MAIN=B
LOGGING.POLLING=B
LOGGING.CONFIG=B

# --- Log rotation settings ---
LOGGING.ROTATE.SIZE_MB=10
LOGGING.ROTATE.BACKUP_COUNT=5

# --- Cleanup settings (used by Phase 3 housekeeping script) ---
LOGGING.CLEANUP.ZIP_AFTER_DAYS=2
LOGGING.CLEANUP.DELETE_AFTER_DAYS=14
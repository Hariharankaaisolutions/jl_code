##############################################################
#                    YOLO / MODEL CONFIG
##############################################################
MODEL_PATH=jl_yolox_cam1.pth
EXP_FILE=/opt/secure_ai/fastback/cam1_app_1_x/YOLOX/exps/default/yolox_s.py
IOU_THRES=0.45
CONF_THRES=0.4
IOU_THRESHOLD=0.6
FRAME_WIDTH=640
FRAME_HEIGHT=480
MAX_DETECTIONS_PER_FRAME=50
ALLOWED_CLASSES=box,bale,trolley

##############################################################
#                  COUNTING CONFIG
# CROSS_LINE_X    : x-pixel position of the count line
# CROSS_DIRECTION : direction an object must travel to be counted
#   left  → object moves right-to-left (old_cx > CROSS_LINE_X >= cx)
#   right → object moves left-to-right (old_cx < CROSS_LINE_X <= cx)
##############################################################
CROSS_LINE_X=200
CROSS_DIRECTION=left

##############################################################
#                  DOUBLE-LINE CONFIG (unused in single-line mode)
##############################################################
ENTRY_LINE_X=300
GHOST_MATCH_DIST_PX=80
GHOST_MAX_AGE_FRAMES=45

##############################################################
#                  TRACKER CONFIG
##############################################################
TRACKER_MAX_DISTANCE=50
TRACKER_MAX_MISSES=10
TRACKER_MIN_HITS=2

##############################################################
#               OBJECT CLASS MAPPING
# BOX_CLASSES   : label → count increment for box counter
# BALE_CLASSES  : label → count increment for bale counter
# DEFAULT_COUNTS: initial count values at session start
#
# Trolley is NOT listed here — it is counted automatically
# by session.py via a 3-second window gate on every
# box/bale crossing event.
##############################################################
BOX_CLASSES=box:1
BALE_CLASSES=bale:1,fbale:1,sbale:2,tbale_a:2,tbale_b:2
DEFAULT_COUNTS=box:0,bale:0,trolley:0,bag:0

##############################################################
#                    BEHAVIOR FLAGS
##############################################################
ENABLE_GUI=true
ASYNC_SLEEP_TIME=0.0
SAVE_FIRST_FRAME=true
SAVE_COUNTED_FRAME=true
END_SESSION_ON_VIDEO_FREEZE=true
MAX_FREEZE_FRAMES=30

##############################################################
#              DETECTION MODE CONFIG
# DETECTION_MODE: rgb (default) or grayscale
#   rgb        → feed color frames directly to model
#   grayscale  → convert frame to grayscale before model inference
#                (use this when model was trained on grayscale images)
#
# The switches below only take effect when DETECTION_MODE=grayscale.
# When DETECTION_MODE=rgb all outputs are always color.
#
# RAW_VIDEO_GRAYSCALE:      true = save raw video in grayscale
#                           false = save raw video in color  (default)
# DETECTED_VIDEO_GRAYSCALE: true = save annotated detection video in grayscale
#                           false = save in color  (default)
# DETECTED_FRAME_GRAYSCALE: true = save captured trip frames in grayscale
#                           false = save in color  (default)
##############################################################
DETECTION_MODE=grayscale
RAW_VIDEO_GRAYSCALE=false
DETECTED_VIDEO_GRAYSCALE=false
DETECTED_FRAME_GRAYSCALE=false

##############################################################
#                     VIDEO SETTINGS
##############################################################
VIDEO_SAVE_DIR=/opt/secure_ai/fastback/cam1_app_1_x/detection_videos
FIRST_FRAME_SAVE_DIR=/opt/secure_ai/fastback/cam1_app_1_x/first_frames
COUNTED_FRAME_SAVE_DIR=/opt/secure_ai/fastback/cam1_app_1_x/counted_frames
DETECTED_FRAMES_DIR=/opt/secure_ai/fastback/database/detected_frames
DAYS_TO_KEEP=10

VIDEO_FRAME_WIDTH=640
VIDEO_FRAME_HEIGHT=480
VIDEO_FPS=20

##############################################################
#                  RTMP STREAM CONFIG
##############################################################
RTMP_BASE_URL=rtmp://localhost/live/
RTMP_USE_AUTH=false
RTMP_USERNAME=
RTMP_PASSWORD=

##############################################################
#                  FASTAPI CONFIG
##############################################################
FASTAPI_TITLE=YOLOv5 Detection Backend
ENABLE_DOCS=true
ALLOWED_ORIGINS=*
HOST=0.0.0.0
PORT=8000

##############################################################
#                  LOGGING CONFIG
##############################################################
LOG_DIR=/opt/secure_ai/fastback/cam1_app_1_x/logs
LOG_FILE_NAME=backend.log
LOG_LEVEL=INFO
LOG_FORMAT=%(asctime)s - %(levelname)s - %(message)s
LOG_ROTATION_DAYS=7
LOG_MAX_SIZE_MB=50

##############################################################
#                    DATABASE CONFIG
##############################################################
DB_NAME=jlmill
DB_USER=kaai
DB_PASSWORD=yourpassword
DB_HOST=localhost
DB_PORT=5432

##############################################################
#                      MQTT CONFIG
##############################################################
MQTT_ENABLED=true
MQTT_HOST=127.0.0.1
MQTT_PORT=1883
MQTT_TOPIC_COUNTS=jl/counts
MQTT_TOPIC_BASE=jlmill/sessions/

##############################################################
#                  GC CLEANUP CONFIG
##############################################################
ENABLE_GC_CLEANUP=true

##############################################################
#                  AUTO-STOP SCHEDULER
##############################################################
AUTO_STOP_ENABLED=true
AUTO_STOP_TIME=18:00
RAW_VIDEO_AUTO_STOP_TIME=19:30

##############################################################
#              REINFORCEMENT LEARNING FRAME CAPTURE
##############################################################
RL_SAVE_DIR=/opt/secure_ai/reinforcement_learning/cam1
RL_CONF_THRESHOLD=0.9
RL_LINE_PROXIMITY_PX=50
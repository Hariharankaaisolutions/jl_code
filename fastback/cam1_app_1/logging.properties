# smart_logger.py — Universal Logging Controller
# ==============================================

import logging
from logging.handlers import RotatingFileHandler
import os
from datetime import datetime

PROPERTIES_FILE = "logging.properties"


# -----------------------------------------------------------------------------
# Load logging.properties file
# -----------------------------------------------------------------------------
def load_properties():
    props = {}

    if not os.path.exists(PROPERTIES_FILE):
        print("[WARN] logging.properties missing — using defaults")
        return props

    with open(PROPERTIES_FILE, "r") as f:
        for line in f:
            line = line.strip()
            if not line or line.startswith("#"):
                continue
            if "=" in line:
                k, v = line.split("=", 1)
                props[k.strip()] = v.strip()

    return props


PROPS = load_properties()


# -----------------------------------------------------------------------------
# Global Logging Mode Mapping
# -----------------------------------------------------------------------------
LEVEL_MAP = {
    "A": logging.DEBUG,
    "B": logging.INFO,
    "C": logging.ERROR
}

GLOBAL_MODE = PROPS.get("LOGGING.MODE", "A").upper()
GLOBAL_LEVEL = LEVEL_MAP.get(GLOBAL_MODE, logging.DEBUG)


# -----------------------------------------------------------------------------
# Subsystem Category Map
# -----------------------------------------------------------------------------
CATEGORY_MAP = {
    "main": "LOGGING.MAIN",
    "session": "LOGGING.SESSION",
    "tracker": "LOGGING.TRACKER",
    "video_saver": "LOGGING.VIDEOSAVER",
    "detected_frame_saver": "LOGGING.FRAMESAVER",
    "detection": "LOGGING.DETECTION",
    "database": "LOGGING.DATABASE",
    "database_updater": "LOGGING.DBUPDATER",
    "mail": "LOGGING.EMAIL",
    "mqtt_push": "LOGGING.MQTT",
    "polling": "LOGGING.POLLING",
    "api": "LOGGING.API",
    "config": "LOGGING.CONFIG",
}


def determine_level(module_name: str):
    """
    Determine logger level for module based on logging.properties
    """
    base = module_name.split(".")[0].lower()
    key = CATEGORY_MAP.get(base)

    if key:
        mode = PROPS.get(key)
        if mode:
            return LEVEL_MAP.get(mode.upper(), GLOBAL_LEVEL)

    return GLOBAL_LEVEL


# -----------------------------------------------------------------------------
# Log Cleanup System (DISABLED)
# -----------------------------------------------------------------------------
LOG_DIR = "logs"

ROTATE_SIZE_MB = int(PROPS.get("LOGGING.ROTATE.SIZE_MB", 250))
ROTATE_BACKUP_COUNT = int(PROPS.get("LOGGING.ROTATE.BACKUP_COUNT", 10))

# Kept only for compatibility – not used anymore
ZIP_AFTER_DAYS = int(PROPS.get("LOGGING.CLEANUP.ZIP_AFTER_DAYS", 5))
DELETE_AFTER_DAYS = int(PROPS.get("LOGGING.CLEANUP.DELETE_AFTER_DAYS", 45))


def cleanup_old_logs():
    """
    Cleanup disabled (NO delete, NO zip)
    """
    return


# Run cleanup automatically once at startup (does nothing now)
cleanup_old_logs()


# -----------------------------------------------------------------------------
# Create Logger
# -----------------------------------------------------------------------------
def get_logger(module_name: str):
    logger = logging.getLogger(module_name)

    # Prevent duplicate handlers
    if logger.handlers:
        return logger

    level = determine_level(module_name)
    logger.setLevel(level)

    os.makedirs(LOG_DIR, exist_ok=True)

    today = datetime.now().strftime("%Y-%m-%d")
    log_path = f"{LOG_DIR}/{today}.log"

    file_handler = RotatingFileHandler(
        log_path,
        maxBytes=ROTATE_SIZE_MB * 1024 * 1024,
        backupCount=ROTATE_BACKUP_COUNT,
        encoding="utf-8"
    )
    file_handler.setLevel(level)
    file_handler.setFormatter(logging.Formatter(
        "%(asctime)s — %(levelname)s — [%(name)s] — %(message)s",
        "%Y-%m-%d %H:%M:%S"
    ))

    console_handler = logging.StreamHandler()
    console_handler.setLevel(level)
    console_handler.setFormatter(logging.Formatter(
        "%(asctime)s — %(levelname)s — %(message)s",
        "%H:%M:%S"
    ))

    logger.addHandler(file_handler)
    logger.addHandler(console_handler)

    logger.debug(
        f"SmartLogger initialized → "
        f"module={module_name} level={logging.getLevelName(level)} file={log_path}"
    )

    return logger

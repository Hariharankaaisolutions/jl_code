##############################################################
#                    YOLO / MODEL CONFIG
##############################################################
YOLOV5_PATH=yolov5
MODEL_PATH=jlcam2final.pt
CONF_THRES=0.7
IOU_THRESHOLD=0.45
FRAME_WIDTH=640
FRAME_HEIGHT=480
CROSS_LINE_X=400
MAX_DETECTIONS_PER_FRAME=50
ALLOWED_CLASSES=bag,trolley

##############################################################
#                  TRACKER CONFIG
##############################################################
TRACKER_MAX_DISTANCE=50
TRACKER_MAX_MISSES=10
TRACKER_MIN_HITS=2

##############################################################
#               OBJECT CLASS MAPPING
##############################################################
BAG_CLASSES=bag:1,2bag:2,3bag:3,4bag:4
DEFAULT_COUNTS=box:0,bale:0,trolley:0,bag:0

##############################################################
#                    BEHAVIOR FLAGS
##############################################################
ENABLE_GUI=false
ASYNC_SLEEP_TIME=0.0
SAVE_FIRST_FRAME=true
SAVE_COUNTED_FRAME=true
END_SESSION_ON_VIDEO_FREEZE=true
MAX_FREEZE_FRAMES=30

##############################################################
#                     VIDEO SETTINGS
##############################################################
VIDEO_SAVE_DIR=/opt/vchanel/fastback/cam2_app_1/detection_videos
VIDEO_SAVE_DIR_raw=/opt/vchanel/fastback/cam1_app_2
FIRST_FRAME_SAVE_DIR=/opt/vchanel/fastback/cam2_app_1/first_frames
COUNTED_FRAME_SAVE_DIR=/opt/vchanel/fastback/cam2_app_1/counted_frames
DETECTED_FRAMES_DIR=/opt/vchanel/fastback/database/detected_frames
DAYS_TO_KEEP=10

VIDEO_FRAME_WIDTH=640
VIDEO_FRAME_HEIGHT=480
VIDEO_FPS=20

##############################################################
#                  RTMP STREAM CONFIG
##############################################################
RTMP_BASE_URL=rtmp://localhost/live/
RTMP_USE_AUTH=false
RTMP_USERNAME=
RTMP_PASSWORD=

##############################################################
#                  FASTAPI CONFIG
##############################################################
FASTAPI_TITLE=YOLOv5 Detection Backend
ENABLE_DOCS=true
ALLOWED_ORIGINS=*
HOST=0.0.0.0
PORT=8001

##############################################################
#                  LOGGING CONFIG (legacy)
##############################################################
LOG_DIR=/opt/vchanel/fastback/cam2_app_1/logs
LOG_FILE_NAME=backend.log
LOG_LEVEL=INFO
LOG_FORMAT=%(asctime)s — %(levelname)s — %(message)s
LOG_ROTATION_DAYS=7
LOG_MAX_SIZE_MB=50

##############################################################
#                    DATABASE CONFIG
##############################################################
DB_NAME=jlmill
DB_USER=kaai
DB_PASSWORD=yourpassword
DB_HOST=localhost
DB_PORT=5432

##############################################################
#                      MQTT CONFIG
##############################################################
MQTT_ENABLED=true
MQTT_HOST=127.0.0.1
MQTT_PORT=1883
MQTT_TOPIC_COUNTS=jl/counts
MQTT_TOPIC_BASE=jlmill/sessions/


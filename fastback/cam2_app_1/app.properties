##############################################################
#                    YOLO / MODEL CONFIG
##############################################################
YOLOV5_PATH=yolov5
MODEL_PATH=jl_greayscale.pt
IOU_THRESHOLD=0.6
FRAME_WIDTH=640
FRAME_HEIGHT=480
MAX_DETECTIONS_PER_FRAME=50
ALLOWED_CLASSES=box,bale,trolley

##############################################################
#                  DOUBLE-LINE COUNTING CONFIG
##############################################################
ENTRY_LINE_X=300
CROSS_LINE_X=200
GHOST_MATCH_DIST_PX=80
GHOST_MAX_AGE_FRAMES=45

##############################################################
#                  TRACKER CONFIG
##############################################################
TRACKER_MAX_DISTANCE=50
TRACKER_MAX_MISSES=10
TRACKER_MIN_HITS=2

##############################################################
#               OBJECT CLASS MAPPING
##############################################################
BOX_CLASSES=box:1
BALE_CLASSES=bale:1,fbale:1,sbale:2,tbale_a:2,tbale_b:2
DEFAULT_COUNTS=box:0,bale:0,trolley:0,bag:0

##############################################################
#                    BEHAVIOR FLAGS
##############################################################
ENABLE_GUI=false
ASYNC_SLEEP_TIME=0.0
SAVE_FIRST_FRAME=true
SAVE_COUNTED_FRAME=true
END_SESSION_ON_VIDEO_FREEZE=true
MAX_FREEZE_FRAMES=30

##############################################################
#              DETECTION MODE CONFIG
# DETECTION_MODE: rgb (default) or grayscale
#   rgb        → feed color frames directly to model
#   grayscale  → convert frame to grayscale before model inference
#                (use this when model was trained on grayscale images)
#
# The switches below only take effect when DETECTION_MODE=grayscale.
# When DETECTION_MODE=rgb all outputs are always color.
#
# RAW_VIDEO_GRAYSCALE:      true = save raw video in grayscale
#                           false = save raw video in color  (default)
# DETECTED_VIDEO_GRAYSCALE: true = save annotated detection video in grayscale
#                           false = save in color  (default)
# DETECTED_FRAME_GRAYSCALE: true = save captured trip frames in grayscale
#                           false = save in color  (default)
##############################################################
DETECTION_MODE=grayscale
RAW_VIDEO_GRAYSCALE=false
DETECTED_VIDEO_GRAYSCALE=true
DETECTED_FRAME_GRAYSCALE=false

##############################################################
#                     VIDEO SETTINGS
##############################################################
VIDEO_SAVE_DIR=/opt/secure_ai/fastback/cam2_app_1/detection_videos
VIDEO_SAVE_DIR_raw=/opt/secure_ai/fastback/cam2_app_1
FIRST_FRAME_SAVE_DIR=/opt/secure_ai/fastback/cam2_app_1/first_frames
COUNTED_FRAME_SAVE_DIR=/opt/secure_ai/fastback/cam2_app_1/counted_frames
DETECTED_FRAMES_DIR=/opt/secure_ai/fastback/database/detected_frames
DAYS_TO_KEEP=10

VIDEO_FRAME_WIDTH=640
VIDEO_FRAME_HEIGHT=480
VIDEO_FPS=20

##############################################################
#                  RTMP STREAM CONFIG
##############################################################
RTMP_BASE_URL=rtmp://localhost/live/
RTMP_USE_AUTH=false
RTMP_USERNAME=
RTMP_PASSWORD=

##############################################################
#                  FASTAPI CONFIG
##############################################################
FASTAPI_TITLE=YOLOv5 Detection Backend
ENABLE_DOCS=true
ALLOWED_ORIGINS=*
HOST=0.0.0.0
PORT=8000

##############################################################
#                  LOGGING CONFIG (legacy)
##############################################################
LOG_DIR=/opt/secure_ai/fastback/cam1_app_1/logs
LOG_FILE_NAME=backend.log
LOG_LEVEL=INFO
LOG_FORMAT=%(asctime)s - %(levelname)s - %(message)s
LOG_ROTATION_DAYS=7
LOG_MAX_SIZE_MB=50

##############################################################
#                    DATABASE CONFIG
##############################################################
DB_NAME=jlmill
DB_USER=kaai
DB_PASSWORD=yourpassword
DB_HOST=localhost
DB_PORT=5432

##############################################################
#                      MQTT CONFIG
##############################################################
MQTT_ENABLED=true
MQTT_HOST=127.0.0.1
MQTT_PORT=1883
MQTT_TOPIC_COUNTS=jl/counts
MQTT_TOPIC_BASE=jlmill/sessions/

##############################################################
#                  GC CLEANUP CONFIG
##############################################################
ENABLE_GC_CLEANUP=true

##############################################################
#                  AUTO-STOP SCHEDULER
##############################################################
AUTO_STOP_ENABLED=true
AUTO_STOP_TIME=19:55
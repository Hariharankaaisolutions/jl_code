
LOGGING.ROTATE.SIZE_MB=250
LOGGING.ROTATE.BACKUP_COUNT=10

LOGGING.CLEANUP.ZIP_AFTER_DAYS=5
LOGGING.CLEANUP.DELETE_AFTER_DAYS=45

###############################################################################
# GLOBAL LOGGING MODE (A = EXTREME, B = NORMAL, C = ERRORS ONLY)
###############################################################################
LOGGING.MODE=B


###############################################################################
# MODULE-LEVEL CONTROLS
###############################################################################

# MAIN SERVER ENTRY
LOGGING.MAIN=A

# SESSION MANAGER, TRACKER, VIDEO HANDLING
LOGGING.SESSION=A
LOGGING.TRACKER=A
LOGGING.VIDEOSAVER=A
LOGGING.FRAMESAVER=A

# YOLO DETECTION CORE
LOGGING.DETECTION=A

# DATABASE
LOGGING.DATABASE=A
LOGGING.DBUPDATER=A

# MAIL / SMTP
LOGGING.EMAIL=A

# MQTT
LOGGING.MQTT=A

# POLLING & FASTAPI ROUTES
LOGGING.POLLING=A
LOGGING.API=A

# CONFIG MODULE
LOGGING.CONFIG=A


# ✅ 1. GLOBAL LOGGING MODE

# This controls the entire backend's logging intensity.

# LOGGING.MODE=A

# 🔵 A = EXTREME LOGGING

# Every detail is logged

# Every function entry, exit, parameter

# Every frame processed

# Every DB query + parameters

# Every detection, including bounding boxes

# Every step in tracker

# MQTT events

# Perfect for debugging & tracing issues

# LOGGING.MODE=B

# 🟢 B = NORMAL LOGGING

# Only important events logged

# Errors

# Warnings

# Session start / stop

# Detection summary

# DB insert / update events

# MQTT push confirmations

# Light and performance-friendly

# LOGGING.MODE=C

# 🔴 C = ERRORS ONLY

# Only .error() and .exception() messages

# No debug

# No info

# Used in production to keep logs clean & small

# ✅ 2. MODULE-LEVEL CONTROLS

# These override or refine the GLOBAL MODE.

# Each module can individually be set to:

# A = EXTREME

# B = NORMAL

# C = ERRORS ONLY

# 🔥 MODULES & WHAT THEY LOG

# Below is the full breakdown, exactly what enabling each logging module logs.

# 📌 LOGGING.MAIN

# Controls logging in main.py

# Logs:

# Server startup

# Model loading

# YOLO threshold config

# RTMP URL formation

# API calls (/start, /stop, /count)

# Cleanup on startup

# Uvicorn launch

# Useful when:

# Backend fails during startup

# YOLO not loading

# Routes returning wrong data

# 📌 LOGGING.SESSION

# Controls session.py

# Logs:

# Session start / stop

# All session metadata

# DB insert success/failure

# Image path updates

# Saving first frames

# End session cleanup

# GC events

# Useful when:

# Sessions are stuck

# DB not updating

# Wrong counts

# Memory leaks

# 📌 LOGGING.TRACKER

# Controls CentroidTracker

# Logs:

# Each center detected

# Distance matrix

# Matches between objects

# New object IDs

# Object disappearances

# Useful when:

# Counts are wrong

# Tracker is unstable

# Duplicate counts happening

# 📌 LOGGING.VIDEOSAVER

# Controls video_saver.py

# Logs:

# Video recording start/stop

# Frame writing failures

# File naming

# Directory creation

# Useful when:

# MP4 files corrupted

# Saving frames fails

# Video not created

# 📌 LOGGING.FRAMESAVER

# Controls detected_frame_saver.py

# Logs:

# Counted frame tracking

# One-time frame save

# File naming

# Callback to session manager

# Useful when:

# Counted frame missing

# Image path not updating

# Wrong saving conditions

# 📌 LOGGING.DETECTION

# Controls detection loop inside main.py

# Logs:

# Every frame taken

# YOLO inference results

# Bounding boxes

# Label extraction

# Tracking & crossing detection

# Frame overlays

# Writing output video

# Useful when:

# YOLO missing detections

# Cross-line logic wrong

# Performance debugging

# 📌 LOGGING.DATABASE

# Controls database.py

# Logs:

# DB connection

# Table creation

# SQL queries with params

# User validation

# Insert session

# Update session on stop

# Get sessions by date

# Useful when:

# DB insert not happening

# Wrong DB credentials

# DB connection pool full

# 📌 LOGGING.DBUPDATER

# Controls database_updater.py

# Logs:

# Every incremental update

# UPDATE SQL queries

# Failures in updating

# Final SQL apply

# Useful when:

# Real-time updates disappear

# MQTT UI not showing correct live counts

# 📌 LOGGING.EMAIL

# Controls mail / SMTP module

# Logs:

# SMTP connect

# Authentication

# Email send status

# Failures

# Useful when:

# Email alerts not reaching

# Gmail SMTP issues

# 📌 LOGGING.MQTT

# Controls mqtt_push.py

# Logs:

# MQTT connect

# Publish events

# Errors during send

# Topic building

# JSON payloads

# Useful when:

# MQTT consumer not receiving messages

# Debugging IoT pipeline

# 📌 LOGGING.POLLING

# Controls DB polling / background tasks (if used)

# Logs:

# Background job loops

# Data polling

# Periodic sync events

# Useful when:

# Cron-like tasks not running

# 📌 LOGGING.API

# Controls FastAPI route-level logging

# Logs:

# API call inputs

# API call outputs

# Validation failures

# 404, 500 errors

# Useful when:

# Client sending wrong API data

# Debugging mobile app or frontend

# 📌 LOGGING.CONFIG

# Controls config_loader.py

# Logs:

# All config loaded

# env overrides

# properties applied

# Fallback defaults

# Wrong or missing keys

# Useful when:

# Config not updating

# Wrong values used by backend

# Environment override debugging